<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Replace Header &amp; Footer — ParentData</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .tool-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 12px;
    }
    .tool-col { display: flex; flex-direction: column; }
    .tool-col label { font-weight: 600; margin-bottom: 6px; }
    .tool-col textarea {
      flex: 1;
      min-height: 420px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 12px;
      line-height: 1.5;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      resize: vertical;
      tab-size: 2;
    }
    .tool-col textarea:focus { border-color: #3b82f6; outline: none; box-shadow: 0 0 0 2px rgba(59,130,246,0.15); }
    .tool-actions { display: flex; gap: 10px; align-items: center; margin-top: 14px; }
  </style>
</head>
<body>
<main class="container" style="max-width: 1100px; margin: 0 auto; padding: 24px;">
  <h1>Replace Header &amp; Footer</h1>
  <p style="color:#555; margin-bottom:16px;">Paste any email HTML on the left. The tool will replace the header and footer with the standard Latest (ParentData) versions.</p>

  <div class="tool-grid">
    <div class="tool-col">
      <label for="input-html">Input HTML</label>
      <textarea id="input-html" placeholder="Paste your email HTML here…"></textarea>
    </div>
    <div class="tool-col">
      <label for="output-html">Output HTML</label>
      <textarea id="output-html" readonly placeholder="Result will appear here…"></textarea>
    </div>
  </div>

  <div class="tool-actions">
    <button type="button" class="btn-primary" onclick="runReplace()">Replace Header &amp; Footer</button>
    <button type="button" class="btn-secondary" onclick="copyOutput()">Copy Output</button>
    <button type="button" class="btn-secondary" onclick="previewOutput()">Preview</button>
    <span id="status" style="color:#555;"></span>
  </div>
</main>

<script>
async function runReplace() {
  const input = document.getElementById('input-html').value;
  if (!input.trim()) { setStatus('Paste some HTML first.', true); return; }

  setStatus('Processing…');
  try {
    const resp = await fetch('/replace-hf', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ html: input }),
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ error: resp.statusText }));
      setStatus('Error: ' + (err.error || resp.statusText), true);
      return;
    }
    const result = await resp.text();
    document.getElementById('output-html').value = result;
    setStatus('Done!');
  } catch (err) {
    setStatus('Network error: ' + err.message, true);
  }
}

async function copyOutput() {
  const output = document.getElementById('output-html').value;
  if (!output) { setStatus('Nothing to copy.', true); return; }
  await navigator.clipboard.writeText(output);
  setStatus('Copied!');
}

function previewOutput() {
  const output = document.getElementById('output-html').value;
  if (!output) { setStatus('Nothing to preview.', true); return; }
  const blob = new Blob([output], { type: 'text/html' });
  window.open(URL.createObjectURL(blob), '_blank');
}

function setStatus(msg, isError) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.color = isError ? '#dc2626' : '#555';
}
</script>
</body>
</html>
