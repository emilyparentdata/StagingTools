<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="x-apple-disable-message-reformatting" />
    <title>Simple Email - ParentData</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&family=DM+Sans:ital,wght@0,400;0,500;0,700;0,800;1,300;1,700&display=swap" rel="stylesheet">

    <style type="text/css">
        /* Email Client Resets */
        body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
        table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
        img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
        body { margin: 0; padding: 0; width: 100% !important; height: 100% !important; }
        table { border-collapse: collapse !important; }
        body, table, td, p, a, li, blockquote { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
        html, body { margin: 0 auto !important; padding: 0 !important; height: 100% !important; width: 100% !important; }
        * { -ms-text-size-adjust: 100%; -webkit-text-size-adjust: 100%; }
        .email-container { max-width: 600px; margin: 0 auto; }
        #outlook a { padding: 0; }
        .ExternalClass { width: 100%; }
        .ExternalClass, .ExternalClass p, .ExternalClass span, .ExternalClass font, .ExternalClass td, .ExternalClass div { line-height: 100%; }

        a[x-apple-data-detectors] {
            color: inherit !important;
            text-decoration: none !important;
            font-size: inherit !important;
            font-family: inherit !important;
            font-weight: inherit !important;
            line-height: inherit !important;
        }

        p a { color: #000000 !important; text-decoration: underline !important; font-family: 'DM Sans', Arial, Helvetica, sans-serif; }
        li a { color: #000000 !important; text-decoration: underline !important; font-family: 'DM Sans', Arial, Helvetica, sans-serif; }
        .apple-link p a { color: #000000 !important; text-decoration: underline !important; font-family: 'DM Sans', Arial, Helvetica, sans-serif; }
        .g-italic-fnt { font-size: 16px !important; }
        .tablebox a, .tablebox li a {
              color: #054f8b !important;
              text-decoration: underline !important;
              font-size: 16px !important;
              font-family: 'DM Sans', Arial, Helvetica, sans-serif;
            }
        .tablebox ul {margin: 0px !important;}
        .tablebox ul li { padding-bottom: 4px !important;}

        /* Responsive styles */
        @media only screen and (max-width: 480px) {
            .subscribe-btn-mobile a { padding: 20px 24px !important; font-size: 20px !important; }
        }
    </style>

    <!--[if gte mso 9]>
    <style type="text/css">
        table { border-collapse: collapse; }

</head>

<body style="margin: 0; padding: 0; background-color: #f4f4f4; font-family: 'DM Sans', Arial, Helvetica, sans-serif;">
<!-- Preview Text (hidden) -->
<div style="display: none; max-height: 0px; overflow: hidden; font-size: 1px; line-height: 1px; color: #ffffff;"></div>
<!-- Main Email Container --><center style="width: 100%; background-color: #f4f4f4;">
<table align="center" border="0" cellpadding="0" cellspacing="0" class="email-container" role="presentation" style="max-width: 600px; margin: 0px auto; background-color: rgb(255, 255, 255); width: 100%;">
<tbody>
<!-- ROW 1: Header -->
<tr style="height: 200px;">
<td style="background-image: url('https://library.iterable.com/3244/21559/714d02ed02c948099ccb7d2044371a93-header-banner-bg-x3.png'); background-position: center center; background-size: 600px 250px; background-repeat: no-repeat; padding: 28px 0px; text-align: center; height: 200px;"><img alt="ParentData Logo" class="fluid" height="75" src="https://library.iterable.com/3244/21559/b5c9498bb7414fe58b65737e0683e0c9-parentlogo-yellow-x3.png" width="179"></td>
</tr>
<!-- ROW 2: Body -->
<tr>
<td style="background-color: rgb(255, 255, 255); padding: 0px 0px 20px;">
<table border="0" cellpadding="0" cellspacing="0" role="presentation" width="100%">
<tbody>
<tr>
<td class="table-box-mobile no-top-pad" style="background-color: rgb(255, 255, 255); padding: 0px 48px 20px;">
<table border="0" cellpadding="0" cellspacing="0" role="presentation" width="100%">
<tbody>
<!-- PRE-BUTTON TEXT -->
<tr>
<td class="tablebox simple-pre-button" style="padding-bottom: 0px;">
<p style="font-family: 'DM Sans', Arial, Helvetica, sans-serif; font-weight: normal; font-size: 16px; line-height: 22px; color: #000000;">Pre-button placeholder text.</p>
</td>
</tr>
<!-- CTA BUTTON -->
<tr>
<td align="center" style="padding: 20px;">
<table align="center" border="0" cellpadding="0" cellspacing="0" role="presentation" style="max-width: 288px; width: 100%;">
<tbody>
<tr>
<td align="center" style="padding: 20px;">
<div class="subscribe-btn-mobile simple-button" style="display: inline-block; mso-hide: all; width: auto; border-radius: 15px; background-color: #fceea9; border: 2px solid #000000; box-shadow: 0px 4px 4px 0px rgba(0,0,0,0.25);"><a href="https://parentdata.org/" rel="noopener" style="display: block; padding: 20px 54px; font-family: 'DM Sans', Arial, Helvetica, sans-serif; font-weight: 800; font-size: 24px; line-height: 20px; letter-spacing: 0.24px; color: #000000; text-decoration: none; text-transform: uppercase; text-align: center; white-space: nowrap;" target="_blank"><span style="font-size: 24px; color: #000000; text-decoration: none;">BUTTON TEXT</span></a></div>
</td>
</tr>
</tbody>
</table>
</td>
</tr>
<!-- POST-BUTTON TEXT -->
<tr>
<td class="tablebox simple-post-button" style="padding-bottom: 0px;">
<p style="font-family: 'DM Sans', Arial, Helvetica, sans-serif; font-weight: normal; font-size: 16px; line-height: 22px; color: #000000;">Post-button placeholder text.</p>
</td>
</tr>
</tbody>
</table>
</td>
</tr>
</tbody>
</table>
</td>
</tr>
<!-- ROW 3: Footer -->
<tr>
<td class="table-box-mobile" style="background-color: rgb(253, 237, 169); padding: 20px 48px 40px;">
<table border="0" cellpadding="0" cellspacing="0" role="presentation" width="100%">
<tbody>
<tr>
<td style="text-align: left; padding-bottom: 24px;"><img alt="Footer Logo" class="fluid" src="https://library.iterable.com/3244/21559/0c234709315b456daeae8158543952a5-footerlogo.png" style="max-width: 120px; height: auto;" width="120"></td>
</tr>
<tr>
<td style="text-align: left; padding-bottom: 16px;">
<p style="margin: 0 0 8px 0; font-family: 'DM Sans', Arial, Helvetica, sans-serif; font-weight: 400; font-size: 14px; line-height: normal; color: #000000;">You are receiving this email because you opted in via our website.</p>
</td>
</tr>
<tr>
<td style="text-align: left; padding-bottom: 12px;">
<p style="margin: 0; font-family: 'DM Sans', Arial, Helvetica, sans-serif; font-weight: 800; font-size: 14px; line-height: normal; color: #000000;">Want to change how you receive these emails?</p>
</td>
</tr>
<tr>
<td style="text-align: left; padding-bottom: 16px;">
<p style="margin: 0; font-family: 'DM Sans', Arial, Helvetica, sans-serif; font-weight: 400; font-size: 14px; line-height: normal; color: #000000;"><a href="{{hostedUnsubscribeUrl}}" style="color: #000000; text-decoration: underline; font-family: 'DM Sans', Arial, Helvetica, sans-serif;">Unsubscribe from this list</a></p>
</td>
</tr>
<tr>
<td style="text-align: left; padding-bottom: 20px;">
<p class="simple-copyright" style="margin: 0; font-family: 'DM Sans', Arial, Helvetica, sans-serif; font-weight: 400; font-size: 12px; line-height: normal; color: #666666;">&copy; 2026 ParentData. All rights reserved.</p>
</td>
</tr>
</tbody>
</table>
</td>
</tr>
</tbody>
</table>
</center>
</body>
</html>
